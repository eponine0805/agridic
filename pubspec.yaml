name: agridic
description: Agricultural Disease Information Community
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  timeago: ^3.7.0
  cached_network_image: ^3.4.1
  path_provider: ^2.1.4
  path: ^1.9.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0
  uuid: ^4.5.0
  flutter_image_compress: ^2.1.0
  geolocator: ^9.0.2
  # Firebase
  firebase_core: ^3.9.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.2

dependency_overrides:
  geolocator_android: 4.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
