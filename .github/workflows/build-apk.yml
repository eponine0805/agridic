name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: "stable"

      - name: Install Flet CLI
        run: pip install flet-cli

      - name: Create Firebase key file
        run: echo '${{ secrets.FIREBASE_KEY }}' > serviceAccountKey.json


      - name: Build APK
        run: yes | flet build apk --module-name main

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agridic-apk
          path: build/apk/*.apk
